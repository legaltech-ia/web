<div class="flex h-full bg-slate-950 overflow-hidden relative dashboard-area">
  
  <!-- Sidebar con transición de ancho -->
  <aside 
    [class.w-64]="isSidebarVisible" 
    [class.w-0]="!isSidebarVisible"
    class="flex flex-col justify-between hidden md:flex transition-all duration-300 overflow-hidden shrink-0 bg-slate-950 text-slate-300 border-slate-800 shadow-none">
    <div class="p-5 w-64">
      <div class="flex flex-col gap-2 mb-8">
        <span class="text-indigo-300 text-lg font-semibold tracking-[0.15em] uppercase">LegalTech CO</span>
        <span class="inline-flex items-center rounded-full px-3 py-1 text-[10px] font-semibold uppercase tracking-[0.25em] bg-slate-900 text-slate-300">CGP</span>
      </div>
      
      <nav class="space-y-2">
        <button 
          (click)="setView('dashboard')"
          [ngClass]="{'bg-indigo-600 text-white shadow-sm': currentView === 'dashboard', 'text-slate-300 hover:bg-slate-800': currentView !== 'dashboard'}"
          class="w-full flex items-center px-4 py-3 rounded-2xl font-medium transition-all text-left"
        >
          <span class="mr-3 text-base">📊</span>
          <span class="font-medium">Dashboard</span>
        </button>
        
        <button 
          (click)="setView('nuevo-proceso')"
          [ngClass]="{'bg-indigo-600 text-white shadow-sm': currentView === 'nuevo-proceso', 'text-slate-300 hover:bg-slate-800': currentView !== 'nuevo-proceso'}"
          class="w-full flex items-center px-4 py-3 rounded-2xl font-medium transition-all text-left"
        >
          <span class="mr-3 text-base">➕</span>
          <span class="font-medium">Nuevo Proceso</span>
        </button>

        <button 
          (click)="setView('expedientes')"
          [ngClass]="{'bg-indigo-600 text-white shadow-sm': currentView === 'expedientes', 'text-slate-300 hover:bg-slate-800': currentView !== 'expedientes'}"
          class="w-full flex items-center px-4 py-3 rounded-2xl font-medium transition-all text-left"
        >
          <span class="mr-3 text-base">💼</span>
          <span class="font-medium">Procesos</span>
        </button>

        <button 
          (click)="toggleArchivoMenu()"
          [ngClass]="{'bg-indigo-600 text-white shadow-sm': archivoOpen || currentView === 'archivo-registrar' || currentView === 'archivo-visualizar', 'text-slate-300 hover:bg-slate-800': !archivoOpen && currentView !== 'archivo-registrar' && currentView !== 'archivo-visualizar'}"
          class="w-full flex items-center px-4 py-3 rounded-2xl font-medium transition-all text-left"
        >
          <span class="mr-3 text-base">📁</span>
          <span class="font-medium">Archivo</span>
        </button>
        <div *ngIf="archivoOpen" class="space-y-2 mt-2 pl-6">
          <button
            (click)="setView('archivo-registrar')"
            [ngClass]="{'bg-slate-800 text-white shadow-sm': currentView === 'archivo-registrar', 'text-slate-300 hover:bg-slate-800': currentView !== 'archivo-registrar'}"
            class="w-full flex items-center px-4 py-2 rounded-2xl font-medium transition-all text-sm"
          >
            Registrar
          </button>
          <button
            (click)="setView('archivo-visualizar')"
            [ngClass]="{'bg-slate-800 text-white shadow-sm': currentView === 'archivo-visualizar', 'text-slate-300 hover:bg-slate-800': currentView !== 'archivo-visualizar'}"
            class="w-full flex items-center px-4 py-2 rounded-2xl font-medium transition-all text-sm"
          >
            Visualizar
          </button>
        </div>
      </nav>
    </div>
    
    <div class="p-4 border-t border-slate-800 bg-slate-900 w-64 relative z-[60] space-y-4">
      <div class="flex items-center gap-2">
        <button (click)="toggleAdminConsole()" title="Consola Admin" aria-label="Consola Admin" class="flex items-center justify-center transition h-10 w-10 rounded-full border border-slate-700 bg-slate-900 text-slate-200 hover:border-indigo-400 hover:text-white shadow-sm">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 7h16M4 12h16M4 17h16"></path>
            <path d="M8 7l4 5-4 5"></path>
          </svg>
        </button>
      </div>

      <div class="p-4 rounded-3xl border border-slate-800 bg-slate-950 text-slate-100 shadow-sm">
        <div class="flex items-center gap-3 text-slate-100">
          <div class="w-10 h-10 rounded-full bg-indigo-600 flex items-center justify-center font-semibold text-white">AB</div>
          <div>
            <p class="text-sm font-semibold leading-none">{{ username }}</p>
            <span class="text-xs text-slate-400">Control de Términos</span>
          </div>
        </div>
        <button (click)="logout()" title="Cerrar sesión" class="mt-3 inline-flex items-center gap-2 rounded-full border border-slate-700 bg-slate-900 px-3 py-1 text-xs font-semibold text-slate-200 hover:bg-slate-800 transition-all">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
          </svg>
          Salir
        </button>
      </div>
    </div>
  </aside>

  <main class="flex-1 overflow-y-auto p-6 md:p-8">
    
    <header class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-8 rounded-3xl p-4 bg-slate-950 border border-slate-800 shadow-inner">
      <div class="flex flex-col sm:flex-row items-start sm:items-center gap-3">
        <button 
          (click)="toggleSidebar()" 
          class="p-2 border border-slate-700 text-slate-200 rounded-lg hover:bg-slate-800 hover:text-white transition-colors"
          title="Alternar Menú"
        >
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
          </svg>
        </button>

        <div class="flex flex-col gap-1 text-slate-100">
          <h1 class="text-2xl font-semibold tracking-tight">Panel de Control</h1>
          <p class="text-sm max-w-2xl text-slate-400">Resumen ejecutivo del estado de los procesos y métricas operativas del sistema.</p>
        </div>
      </div>
    </header>

    <app-new-process *ngIf="currentView === 'nuevo-proceso'"></app-new-process>

    <app-recent-cases *ngIf="currentView === 'expedientes'"></app-recent-cases>

    <app-digital-archive-management *ngIf="currentView === 'archivo-registrar'"></app-digital-archive-management>

    <app-national-norms *ngIf="currentView === 'archivo-visualizar'"></app-national-norms>
  </main>

  <admin-log-request *ngIf="showAdminConsole$ | async"></admin-log-request>
</div>
