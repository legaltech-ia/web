<div class="min-h-screen bg-slate-950 text-slate-100 flex flex-col justify-center py-12 sm:px-6 lg:px-8">
  <div class="sm:mx-auto w-full max-w-md">
    <div class="flex justify-center text-indigo-400">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-14 w-14 drop-shadow-sm" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 11c0 3.517-1.009 6.799-2.753 9.571m-3.44-2.04l.054-.09A13.916 13.916 0 008 11a4 4 0 118 0c0 1.017-.07 2.019-.203 3m-2.118 6.844A21.88 21.88 0 0015.171 17m3.839 1.132c.645-2.266.99-4.659.99-7.132A8 8 0 008 4.07M3 15.364c.64-1.319 1-2.8 1-4.364 0-1.457.39-2.823 1.07-4" />
      </svg>
    </div>
    <h2 class="mt-4 text-center text-3xl font-extrabold text-slate-100 tracking-tight">{{ messages.login.title }}</h2>
    <p class="mt-2 text-center text-sm text-slate-400">{{ messages.login.subtitle }}</p>
  </div>

  <div class="mt-8 sm:mx-auto w-full max-w-md">
    <div class="bg-slate-900 py-8 px-4 shadow-xl rounded-xl sm:px-10 border border-slate-800">
      <div *ngIf="errorMessage" class="mb-4 p-4 bg-rose-950/70 border border-rose-700 rounded-lg">
        <p class="text-sm text-rose-300">{{ errorMessage }}</p>
      </div>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-6">
        <div>
          <label class="block text-sm font-medium text-slate-300">{{ messages.login.userLabel }}</label>
          <div class="mt-1">
            <input formControlName="email" type="email" required 
              class="appearance-none block w-full px-3 py-2.5 bg-slate-800 border border-slate-700 rounded-lg shadow-sm text-slate-100 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-300">{{ messages.login.passwordLabel }}</label>
          <div class="mt-1">
            <input formControlName="password" type="password" required 
              class="appearance-none block w-full px-3 py-2.5 bg-slate-800 border border-slate-700 rounded-lg shadow-sm text-slate-100 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
          </div>
        </div>

        <div *ngIf="mfaRequired">
          <label class="block text-sm font-medium text-slate-300">{{ messages.login.mfaCodeLabel }}</label>
          <div class="mt-1">
            <input formControlName="code" type="text" required 
              class="appearance-none block w-full px-3 py-2.5 bg-slate-800 border border-slate-700 rounded-lg shadow-sm text-slate-100 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
          </div>
        </div>

        <div>
          <button type="submit" [disabled]="loginForm.invalid || isLoading" 
            class="w-full flex justify-center py-2.5 px-4 border border-transparent rounded-lg shadow-sm text-sm font-semibold text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 disabled:opacity-50 transition-all">
            <span *ngIf="!isLoading">{{ mfaRequired ? messages.login.verifyButton : messages.login.loginButton }}</span>
            <span *ngIf="isLoading" class="flex items-center gap-2">
              <svg class="animate-spin h-4 w-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
              </svg>
              Procesando...
            </span>
          </button>
        </div>
      </form>

      <p class="mt-6 text-center text-sm text-slate-400">
        {{ messages.login.noAccountText }}
        <button (click)="goToRegister()" type="button" class="text-indigo-400 hover:text-indigo-300 font-semibold">
          {{ messages.login.registerLinkText }}
        </button>
      </p>
    </div>
  </div>
</div>
